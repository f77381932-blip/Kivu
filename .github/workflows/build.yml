name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev openjdk-17-jdk ant python3-setuptools

      - name: Install buildozer and dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36
          # Kivy и KivyMD на этом этапе устанавливать в систему НЕ обязательно, 
          # так как buildozer скачает их сам внутри рецептов.

      - name: Accept Android Licenses
        # Это "лечит" ошибку с AIDL, так как SDK начинает скачиваться корректно
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        # Используем 'yes |' чтобы подтвердить установку SDK внутри самого процесса buildozer
        run: yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: machine-core-apk
          path: bin/*.apk
